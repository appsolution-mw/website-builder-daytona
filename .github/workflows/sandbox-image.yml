name: Build sandbox image

on:
  push:
    branches: [main]
    paths:
      - 'container/sandbox/**'
      - 'packages/protocol/**'
      - 'pnpm-lock.yaml'
      - '.github/workflows/sandbox-image.yml'
  pull_request:
    paths:
      - 'container/sandbox/**'
      - 'packages/protocol/**'
      - 'pnpm-lock.yaml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v5
        with:
          context: .
          file: container/sandbox/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ghcr.io/appsolution-mw/sandbox:${{ github.sha }}
            ghcr.io/appsolution-mw/sandbox:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
